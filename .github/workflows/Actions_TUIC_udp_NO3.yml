name: Actions_TUIC_udp_NO3

on:
  workflow_dispatch:
    inputs:
      ZT_NETWORK_ID:
        description: '你的 ZeroTier 网络 ID'
        required: true
        default: '645ae69a72a847d5'
      PROXY_PASSWORD:
        description: '代理服务的密码 (用于 TUIC)'
        required: true
        default: 'password123'
      TUIC_PORT:
        description: 'TUIC 监听端口'
        required: true
        default: '10004'
      TUIC_UUID:
        description: 'TUIC v5 的 UUID'
        required: true
        default: '83f6d100-0544-4bd5-88f0-da835c2604af'
      HY2_PORT:
        description: 'Hysteria2 监听端口'
        required: true
        default: '10005'
      KCP_PORT:
        description: 'KCP (Kcptun) 监听端口'
        required: true
        default: '10006'
      WG_PORT:
        description: 'WireGuard 监听端口'
        required: true
        default: '10007'
      SS_PORT:
        description: 'Shadowsocks-UDP 监听端口'
        required: true
        default: '10008'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装基础工具
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget ifstat btop iperf3 jq openssl net-tools qrencode wireguard-tools resolvconf procps iproute2

      - name: 安装并配置 ZeroTier
        run: |
          curl -s https://install.zerotier.com | sudo bash
          sudo systemctl stop zerotier-one
          
          # 导入现有的身份文件以固定 IP
          if [ -f "./identity.secret" ] && [ -f "./identity.public" ]; then
            sudo cp ./identity.secret /var/lib/zerotier-one/identity.secret
            sudo cp ./identity.public /var/lib/zerotier-one/identity.public
            sudo chmod 0600 /var/lib/zerotier-one/identity.secret
          fi
          
          # 加载自建 planet 文件
          if [ -f "./planet" ]; then
            sudo cp ./planet /var/lib/zerotier-one/planet
          fi
          
          sudo systemctl start zerotier-one
          sleep 5

      - name: 加入 ZeroTier 网络
        run: |
          sudo zerotier-cli join ${{ github.event.inputs.ZT_NETWORK_ID }}
          echo "等待 ZeroTier 分配局域网 IP..."
          for i in {1..20}; do
            # 强化逻辑：抓取最后一列，通过 tr 分隔多地址，grep 排除 IPv6(冒号)，只取第一个 IPv4
            ZT_IP=$(sudo zerotier-cli listnetworks | grep ${{ github.event.inputs.ZT_NETWORK_ID }} | awk '{print $NF}' | tr ',' '\n' | grep -v ':' | head -n 1 | cut -d/ -f1)
            if [[ $ZT_IP =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "✅ 已分配到内网 IPv4: $ZT_IP"
              break
            fi
            sleep 5
          done

      - name: 配置并开启 SSH 服务
        run: |
          sudo apt-get install -y openssh-server
          echo "runner:kkk" | sudo chpasswd
          echo "root:kkk" | sudo chpasswd
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          echo "✅ SSH 服务已开启，密码为: kkk"

      - name: 网络环境优化 (极速模式)
        run: |
          # 1. 调大内核 UDP 缓冲区 (解决 TUIC/QUIC 高速下的丢包问题)
          sudo sysctl -w net.core.rmem_max=33554432
          sudo sysctl -w net.core.wmem_max=33554432
          sudo sysctl -w net.ipv4.udp_mem='33554432 33554432 33554432'
          
          # 2. 禁用反向路径过滤 (解决 ZeroTier UDP 报文被拦截问题)
          sudo sysctl -w net.ipv4.conf.all.rp_filter=0
          sudo sysctl -w net.ipv4.conf.default.rp_filter=0
          sudo sysctl -w net.ipv4.conf.eth0.rp_filter=0
          
          # 3. 开启 BBR 拥塞控制
          sudo modprobe tcp_bbr
          echo "net.core.default_qdisc=fq" | sudo tee -a /etc/sysctl.conf
          echo "net.ipv4.tcp_congestion_control=bbr" | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p
          
          echo "✅ 内核参数优化成功"

      - name: ZeroTier 链路优化 (MTU 锁定)
        run: |
          set -x
          # 强化逻辑：使用 ip link show 匹配 zt 开头的网卡名，更加健壮
          ZT_DEV=$(ip -o link show | grep "zt" | awk -F': ' '{print $2}' | cut -d'@' -f1 | head -n 1)
          if [ -n "$ZT_DEV" ]; then
            # 锁定 MTU 为 1280 解决公网传输中的分片导致的性能瓶颈
            sudo ip link set $ZT_DEV mtu 1280
            echo "✅ ZeroTier 接口 $ZT_DEV MTU 已锁定为 1280"
          else
            echo "⚠️ 警告: 未找到 ZeroTier 网卡，跳过 MTU 优化"
          fi

      - name: 部署 TUIC, Hysteria2 与 iperf3
        env:
          PROXY_PASSWORD: ${{ github.event.inputs.PROXY_PASSWORD }}
          TUIC_PORT: ${{ github.event.inputs.TUIC_PORT }}
          TUIC_UUID: ${{ github.event.inputs.TUIC_UUID }}
          HY2_PORT: ${{ github.event.inputs.HY2_PORT }}
          KCP_PORT: ${{ github.event.inputs.KCP_PORT }}
          SS_PORT: ${{ github.event.inputs.SS_PORT }}
          WG_PORT: ${{ github.event.inputs.WG_PORT }}
          HYSTERIA_BRUTAL_DEBUG: 1
        run: |
          set -x
          # 动态查找 ZeroTier
          ZT_CLI=$(which zerotier-cli || echo "/usr/sbin/zerotier-cli")
          
          # 强化逻辑：确保抓到的是 IPv4
          ZT_IP=$(sudo $ZT_CLI listnetworks | grep ${{ github.event.inputs.ZT_NETWORK_ID }} | awk '{print $NF}' | tr ',' '\n' | grep -v ':' | head -n 1 | cut -d/ -f1)
          
          if [[ ! $ZT_IP =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 错误: 无法获取有效的 IPv4 地址 (当前抓取内容: $ZT_IP)"
            exit 1
          fi

          # 1. 环境清理
          sudo iptables -F
          sudo ufw disable || true
          
          # 2. 证书生成 (通用)
          mkdir -p ./certs
          openssl req -x509 -nodes -newkey rsa:2048 -keyout ./certs/server.key -out ./certs/server.crt \
            -subj "/CN=baidu.com" -days 3650 \
            -addext "subjectAltName=DNS:baidu.com,IP:$ZT_IP" \
            -addext "basicConstraints=critical,CA:FALSE"
          
          # 3. 部署 TUIC v5
          TAG_TUIC=$(curl -s "https://api.github.com/repos/tuic-protocol/tuic/releases/latest" | jq -r ".tag_name")
          if [ -z "$TAG_TUIC" ] || [ "$TAG_TUIC" == "null" ]; then TAG_TUIC="v5.0.0"; fi
          curl -L -o tuic "https://github.com/tuic-protocol/tuic/releases/download/${TAG_TUIC}/${TAG_TUIC}-x86_64-unknown-linux-gnu"
          chmod +x tuic
          
          # 核心优化：针对 227ms 高延迟，将窗口调大至 8MB (8388608) 以释放吞吐量
          cat <<EOF > tuic.json
          {
            "server": "0.0.0.0:$TUIC_PORT",
            "users": {
              "$TUIC_UUID": "$PROXY_PASSWORD"
            },
            "certificate": "$(pwd)/certs/server.crt",
            "private_key": "$(pwd)/certs/server.key",
            "congestion_control": "bbr",
            "alpn": ["h3"],
            "send_window": 16777216,
            "receive_window": 16777216,
            "gc_interval": "10s",
            "log_level": "info"
          }
          EOF
          
          echo "--- 生成的 TUIC 配置预览 ---"
          cat tuic.json
          echo "--------------------------"
          
          if [ -f "./tuic" ]; then
            sudo ./tuic -c tuic.json > tuic.log 2>&1 &
          else
            echo "❌ 错误: tuic 二进制文件不存在"
          fi
          
          # 4. 部署 Hysteria2
          TAG_HY2=$(curl -s "https://api.github.com/repos/apernet/hysteria/releases/latest" | jq -r ".tag_name")
          if [ -z "$TAG_HY2" ] || [ "$TAG_HY2" == "null" ]; then TAG_HY2="v2.5.2"; fi
          curl -L -o hy2 "https://github.com/apernet/hysteria/releases/download/${TAG_HY2}/hysteria-linux-amd64"
          chmod +x hy2
          cat <<EOF > hy2.yaml
          listen: :$HY2_PORT
          tls:
            cert: $(pwd)/certs/server.crt
            key: $(pwd)/certs/server.key
          auth:
            type: password
            password: $PROXY_PASSWORD
          masquerade:
            type: proxy
            proxy:
              url: https://www.baidu.com
              rewriteHost: true
          EOF
          if [ -f "./hy2" ]; then
            sudo ./hy2 server -c hy2.yaml > hy2.log 2>&1 &
          else
            echo "❌ 错误: hy2 二进制文件不存在"
          fi

          # 5. 部署 KCP (Kcptun) - 映射到本地 SSH 22
          TAG_KCP=$(curl -s "https://api.github.com/repos/xtaci/kcptun/releases/latest" | jq -r ".tag_name")
          if [ -z "$TAG_KCP" ] || [ "$TAG_KCP" == "null" ]; then TAG_KCP="v20240401"; fi
          KCP_URL="https://github.com/xtaci/kcptun/releases/download/${TAG_KCP}/kcptun-linux-amd64-${TAG_KCP#v}.tar.gz"
          curl -L -o kcptun.tar.gz "$KCP_URL"
          tar -zxf kcptun.tar.gz server_linux_amd64 || echo "Tar extraction failed, but continuing..."
          chmod +x server_linux_amd64 || true
          if [ -f "./server_linux_amd64" ]; then
            sudo ./server_linux_amd64 -l ":$KCP_PORT" -t "127.0.0.1:22" --key "$PROXY_PASSWORD" --mode fast3 > kcp.log 2>&1 &
          else
            echo "❌ 错误: Kcptun 二进制文件不存在"
          fi

          # 6. 部署 Shadowsocks-UDP
          curl -L -o ss2 "https://github.com/shadowsocks/go-shadowsocks2/releases/download/v0.1.5/go-shadowsocks2-linux-amd64"
          chmod +x ss2
          if [ -f "./ss2" ]; then
            sudo ./ss2 -s "ss://AEAD_AES_256_GCM:$PROXY_PASSWORD@:$SS_PORT" -verbose > ss.log 2>&1 &
          else
            echo "❌ 错误: Shadowsocks 二进制文件不存在"
          fi

          # 7. 部署 WireGuard (wireguard-go 用户态)
          curl -L -o wg-go https://github.com/P3TERX/wireguard-go-builder/releases/download/0.0.20230223/wireguard-go-linux-amd64
          chmod +x wg-go
          sudo mv wg-go /usr/local/bin/wireguard-go
          WG_PRIV=$(wg genkey)
          WG_PUB=$(echo "$WG_PRIV" | wg pubkey)
          echo "$WG_PRIV" > wg_priv.key
          echo "$WG_PUB" > wg_pub.key
          cat <<EOF > wg0.conf
          [Interface]
          PrivateKey = $WG_PRIV
          Address = 10.0.0.1/24
          ListenPort = $WG_PORT
          EOF
          if [ -f "/usr/local/bin/wireguard-go" ]; then
            sudo /usr/local/bin/wireguard-go wg0 || true
            sudo wg setconf wg0 wg0.conf || true
            sudo ip address add 10.0.0.1/24 dev wg0 || true
            sudo ip link set up dev wg0 || true
          else
            echo "❌ 错误: wireguard-go 二进制文件不存在"
          fi

          # 8. 启动 iperf3 服务
          iperf3 -s -D
          
          # 9. 开启 出口节点 转发与端口放行
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          sudo iptables -A INPUT -p udp --dport $TUIC_PORT -j ACCEPT
          sudo iptables -A INPUT -p tcp --dport $TUIC_PORT -j ACCEPT
          sudo iptables -A INPUT -p udp --dport $HY2_PORT -j ACCEPT
          sudo iptables -A INPUT -p tcp --dport $HY2_PORT -j ACCEPT
          sudo iptables -A INPUT -p udp --dport $KCP_PORT -j ACCEPT
          sudo iptables -A INPUT -p udp --dport $SS_PORT -j ACCEPT
          sudo iptables -A INPUT -p udp --dport $WG_PORT -j ACCEPT
          sudo iptables -A INPUT -p tcp --dport 5201 -j ACCEPT
          sudo iptables -A INPUT -p udp --dport 5201 -j ACCEPT

          sleep 5
          echo "--- 全系统监听状态报告 ---"
          sudo netstat -tunlp
          echo "------------------------"

      - name: 导入监控脚本到 /root
        run: |
          set -x
          sudo cp ./monitor.sh /root/monitor.sh
          sudo chmod +x /root/monitor.sh
          echo "✅ 监控脚本已导入到 /root/monitor.sh，可手动启动"

      - name: 维持运行并输出信息 (全方位调试模式)
        env:
          PROXY_PASSWORD: ${{ github.event.inputs.PROXY_PASSWORD }}
          TUIC_PORT: ${{ github.event.inputs.TUIC_PORT }}
          TUIC_UUID: ${{ github.event.inputs.TUIC_UUID }}
          HY2_PORT: ${{ github.event.inputs.HY2_PORT }}
          KCP_PORT: ${{ github.event.inputs.KCP_PORT }}
          SS_PORT: ${{ github.event.inputs.SS_PORT }}
          WG_PORT: ${{ github.event.inputs.WG_PORT }}
        run: |
          set -x # 开启调试输出，显示每一条执行的命令
          
          # 动态查找 ZeroTier 路径
          ZT_CLI=$(which zerotier-cli || echo "/usr/sbin/zerotier-cli")
          IP_CMD=$(which ip || echo "/usr/sbin/ip")
          
          ZT_IP=$(sudo $ZT_CLI listnetworks | grep ${{ github.event.inputs.ZT_NETWORK_ID }} | awk '{print $NF}' | tr ',' '\n' | grep -v ':' | head -n 1 | cut -d/ -f1)
          
          TUIC_LINK="tuic://${{ github.event.inputs.TUIC_UUID }}:${{ github.event.inputs.PROXY_PASSWORD }}@${ZT_IP}:${{ github.event.inputs.TUIC_PORT }}?insecure=1&alpn=h3&sni=baidu.com#A-TUIC5"
          HY2_LINK="hy2://${{ github.event.inputs.PROXY_PASSWORD }}@${ZT_IP}:${{ github.event.inputs.HY2_PORT }}?insecure=1&sni=baidu.com#A-HY2"
          SS_LINK="ss://$(echo -n "aes-256-gcm:${{ github.event.inputs.PROXY_PASSWORD }}" | base64 -w 0)@${ZT_IP}:${{ github.event.inputs.SS_PORT }}#A-SS-UDP"
          
          # [核心修复] 使用原生输入变量填充 JSON
          TUIC_JSON="{\"h\":\"$ZT_IP\",\"p\":${{ github.event.inputs.TUIC_PORT }},\"w\":\"${{ github.event.inputs.PROXY_PASSWORD }}\",\"u\":\"${{ github.event.inputs.TUIC_UUID }}\",\"d\":[\"1.1.1.1\",\"8.8.8.8\"]}"

          # 2. 生成 PNG 记录到仓库根目录并推送
          qrencode -o tuic_qr.png -s 10 "$TUIC_JSON"
          qrencode -o hy2_qr.png -s 10 "$HY2_LINK"
          qrencode -o ss_qr.png -s 10 "$SS_LINK"
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tuic_qr.png hy2_qr.png ss_qr.png
          git commit -m "自动更新二维码 (多协议) [skip ci]" || echo "没有变更"
          git push || echo "Git push failed, but continuing..."

          # 3. 准备 Summary 数据
          echo "### 🚀 部署完成 (全协议 UDP 矩阵)" >> $GITHUB_STEP_SUMMARY
          echo "#### 1. TUIC v5" >> $GITHUB_STEP_SUMMARY
          echo "- **链接**: \`$TUIC_LINK\`" >> $GITHUB_STEP_SUMMARY
          echo "#### 2. Hysteria2" >> $GITHUB_STEP_SUMMARY
          echo "- **链接**: \`$HY2_LINK\`" >> $GITHUB_STEP_SUMMARY
          echo "#### 3. Shadowsocks-UDP" >> $GITHUB_STEP_SUMMARY
          echo "- **链接**: \`$SS_LINK\`" >> $GITHUB_STEP_SUMMARY
          
          while true; do
            echo "--- [$(date '+%H:%M:%S')] 健康检查 ---"
            pgrep -x "hy2" >/dev/null || ( [[ -f "./hy2" ]] && sudo ./hy2 server -c hy2.yaml > hy2.log 2>&1 & )
            pgrep -x "ss2" >/dev/null || ( [[ -f "./ss2" ]] && sudo ./ss2 -s "ss://AEAD_AES_256_GCM:$PROXY_PASSWORD@:$SS_PORT" -verbose > ss.log 2>&1 & )
            pgrep -f "server_linux_amd64" >/dev/null || ( [[ -f "./server_linux_amd64" ]] && sudo ./server_linux_amd64 -l ":$KCP_PORT" -t "127.0.0.1:22" --key "$PROXY_PASSWORD" --mode fast3 > kcp.log 2>&1 & )
            ip link show wg0 >/dev/null 2>&1 || ( [[ -f "/usr/local/bin/wireguard-go" ]] && sudo /usr/local/bin/wireguard-go wg0 && sudo wg setconf wg0 wg0.conf && sudo ip address add 10.0.0.1/24 dev wg0 && sudo ip link set up dev wg0 )
            pgrep -x "iperf3" >/dev/null || iperf3 -s -D
            sleep 600
          done
